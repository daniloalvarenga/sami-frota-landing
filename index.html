<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="theme-color" content="#0A2540" />
  <meta name="description" content="Sami Frota — Bot da Frota no Telegram" />
  <title>Sami Frota · Guia Rápido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --primary: #0a2540;
      --primary-2: #0f3460;
      --accent: #00b894;
      --accent-2: #00d4aa;
      --accent-3: #0ea5e9;
      --highlight: #ffb800;
      --danger: #ff6b6b;
      --bg: #f5f7fa;
      --bg-card: #ffffff;
      --text: #0a2540;
      --text-muted: #5a6b7b;
      --text-light: #8696a7;
      --border: rgba(10, 37, 64, 0.08);
      --shadow-sm: 0 2px 8px rgba(10, 37, 64, 0.06);
      --shadow-md: 0 12px 32px rgba(10, 37, 64, 0.1);
      --shadow-lg: 0 24px 60px rgba(10, 37, 64, 0.16);
      --radius: 18px;
      --radius-lg: 28px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      position: relative;
    }

    /* ====== Layout 9:16 ====== */
    .deck {
      height: 100vh;
      width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .deck::-webkit-scrollbar {
      display: none;
    }

    .slide {
      min-height: 100vh;
      min-height: 100dvh;
      width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 22px 96px;
      position: relative;
      overflow: hidden;
    }

    .slide-inner {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      position: relative;
      z-index: 2;
    }

    /* ====== Backgrounds ====== */
    .slide-cover {
      background: linear-gradient(165deg, #0a2540 0%, #103a66 45%, #0f6e7a 100%);
      color: #fff;
    }
    .slide-cover::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 18% 22%, rgba(0, 212, 170, 0.35) 0%, transparent 45%),
        radial-gradient(circle at 82% 78%, rgba(14, 165, 233, 0.32) 0%, transparent 45%),
        radial-gradient(circle at 50% 100%, rgba(255, 184, 0, 0.18) 0%, transparent 50%);
      animation: drift 18s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0% {
        transform: translate(0, 0) scale(1);
      }
      100% {
        transform: translate(3%, -3%) scale(1.05);
      }
    }

    .scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .scroll-hint::after {
      content: "";
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), transparent);
      animation: scrollLine 1.6s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0% { transform: scaleY(0); transform-origin: top; }
      50% { transform: scaleY(1); transform-origin: top; }
      51% { transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }

    /* ====== Typography ====== */
    h1 {
      font-size: clamp(36px, 8.5vw, 48px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 16px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.78);
    }

    .lead {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.5;
    }

    /* ====== Cover ====== */
    .cover-emoji {
      font-size: 76px;
      line-height: 1;
      margin-bottom: 12px;
      display: inline-block;
      animation: floaty 4s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(0, 212, 170, 0.35));
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }
    .cover-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      width: fit-content;
    }
    .cover-tag .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00d4aa;
      box-shadow: 0 0 12px #00d4aa;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    /* ====== Home cards ====== */
    .home-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 8px;
    }
    .home-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: var(--radius);
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s, background 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .home-card:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.15);
    }
    .home-card:active {
      transform: scale(0.98);
    }
    .home-card .card-icon {
      font-size: 44px;
      line-height: 1;
      flex-shrink: 0;
    }
    .home-card .card-text {
      flex: 1;
    }
    .home-card .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .home-card .card-desc {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.4;
    }
    .home-card .card-arrow {
      font-size: 20px;
      opacity: 0.6;
    }

    /* ====== CTA ====== */
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      background: #fff;
      color: var(--primary);
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      box-shadow: var(--shadow-md);
      width: fit-content;
      transition: transform 0.2s;
    }
    .cta:active { transform: scale(0.97); }

    /* ====== Animations on view ====== */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .slide.in-view .reveal { opacity: 1; transform: translateY(0); }
    .slide.in-view .reveal:nth-child(1) { transition-delay: 0.05s; }
    .slide.in-view .reveal:nth-child(2) { transition-delay: 0.15s; }
    .slide.in-view .reveal:nth-child(3) { transition-delay: 0.25s; }
    .slide.in-view .reveal:nth-child(4) { transition-delay: 0.35s; }
    .slide.in-view .reveal:nth-child(5) { transition-delay: 0.45s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="deck" id="deck">
    <!-- ========== SLIDE 1 — Home Cover ========== -->
    <section class="slide slide-cover" data-slide>
      <div class="slide-inner">
        <span class="cover-tag"><span class="dot"></span>Frota Sami · Telegram</span>
        <div class="reveal"><span class="cover-emoji">🚗💬</span></div>
        <h1 class="reveal">Sami Frota</h1>
        <p class="lead reveal" style="max-width: 360px;">
          O bot que gerencia a frota da sua empresa pelo Telegram — rápido, simples e disponível 24h.
        </p>

        <div class="reveal home-cards">
          <a class="home-card" href="como-conversar.html">
            <span class="card-icon">💬</span>
            <div class="card-text">
              <div class="card-title">Como Conversar</div>
              <div class="card-desc">Aprenda a conversar com o bot em linguagem natural</div>
            </div>
            <span class="card-arrow">→</span>
          </a>
          <a class="home-card" href="como-usar.html">
            <span class="card-icon">📋</span>
            <div class="card-text">
              <div class="card-title">Como Usar</div>
              <div class="card-desc">Todos os 14 itens do menu + conversa livre</div>
            </div>
            <span class="card-arrow">→</span>
          </a>
        </div>

        <div class="reveal" style="margin-top: 8px;">
          <a class="cta" href="https://t.me/sami_frota_bot" target="_blank" rel="noopener">
            💬 Abrir o bot no Telegram
          </a>
        </div>
      </div>
      <div class="scroll-hint" aria-hidden="true">deslize</div>
    </section>
  </main>

  <script>
    (function () {
      const deck = document.getElementById("deck");
      const slides = Array.from(document.querySelectorAll("[data-slide]"));

      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting && entry.intersectionRatio > 0.55) {
              entry.target.classList.add("in-view");
            }
          });
        },
        { root: deck, threshold: [0, 0.55, 1] }
      );
      slides.forEach((s) => io.observe(s));

      window.addEventListener("keydown", (e) => {
        const cur = slides.findIndex(
          (s) => Math.abs(s.getBoundingClientRect().top) < 5
        );
        if (e.key === "ArrowDown" || e.key === "PageDown" || e.key === " ") {
          e.preventDefault();
          if (cur < slides.length - 1) slides[cur + 1].scrollIntoView({ behavior: "smooth" });
        } else if (e.key === "ArrowUp" || e.key === "PageUp") {
          e.preventDefault();
          if (cur > 0) slides[cur - 1].scrollIntoView({ behavior: "smooth" });
        }
      });
    })();
  </script>
</body>
</html>
